<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAD - Voice Activity Detection</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="timer-bar">
        <span id="timer-text">Closing in 25s</span>
        <button id="timer-pause">Pause</button>
    </div>
    <div class="container">
        <h1>Voice Activity Detection</h1>
        <p class="subtitle">Pyannote Segmentation 3.0 via ONNX</p>

        <div class="upload-section">
            <label for="audio-file" class="upload-label">
                <span id="upload-text">Select an audio file (.mp3, .wav, .ogg, .f32)</span>
                <input type="file" id="audio-file" accept=".mp3,.wav,.ogg,.flac,.f32,.pcm,.raw">
            </label>
            <button id="detect-btn" disabled>Detect Speech</button>
        </div>

        <div id="status" class="status hidden"></div>

        <div id="results" class="results hidden">
            <h2>Results</h2>
            <div class="summary">
                <span id="summary-segments"></span>
                <span id="summary-speakers"></span>
                <span id="summary-duration"></span>
            </div>
            <table id="segments-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Start (s)</th>
                        <th>End (s)</th>
                        <th>Duration (s)</th>
                        <th>Speaker</th>
                        <th>Confidence</th>
                        <th>Play</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
