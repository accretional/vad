syntax = "proto3";

package vad;

option go_package = "github.com/accretional/vad/proto/vadpb";

// VoiceSegmentation performs voice activity detection and speaker diarization
// on audio input using pyannote segmentation 3.0.
service VoiceSegmentation {
  // Detect processes raw audio and returns speaker-diarized segments.
  rpc Detect(Audio) returns (Diarization);

  // DetectStream processes a live audio stream and emits segmentation events
  // (speech activity transitions, completed segments) in real time. Intended
  // for utterance endpointing in interactive voice apps — eliminates the
  // client-side polling loop required when using Detect on rolling buffers.
  //
  // Client sends AudioChunks as they're captured; server accumulates a rolling
  // buffer and emits SegmentationEvents as state changes. Client should set
  // end_of_stream=true on its final chunk so the server can flush.
  rpc DetectStream(stream AudioChunk) returns (stream SegmentationEvent);

  // Fetch returns the ONNX model weights, either as raw bytes or as a
  // redirect URL if the server is configured with a weight URL.
  rpc Fetch(FetchRequest) returns (FetchResponse);
}

// Audio contains raw PCM audio data for voice activity detection.
message Audio {
  // Raw PCM audio samples as 16kHz mono float32 little-endian bytes.
  bytes samples = 1;

  // Sample rate in Hz. Must be 16000.
  int32 sample_rate = 2;
}

// Diarization contains the detected speaker segments.
message Diarization {
  // The detected speech segments with speaker assignments.
  repeated Segment segments = 1;

  // Total duration of the input audio in seconds.
  double duration = 2;
}

// Segment represents a contiguous speech region attributed to a single speaker.
message Segment {
  // Start time in seconds from the beginning of the audio.
  double start = 1;

  // End time in seconds from the beginning of the audio.
  double end = 2;

  // Speaker identifier (0-indexed).
  int32 speaker_id = 3;

  // Confidence score for this segment (0.0 - 1.0).
  float confidence = 4;
}

// AudioChunk is one piece of an ongoing audio stream sent to DetectStream.
message AudioChunk {
  // Raw PCM audio samples as 16 kHz mono float32 little-endian bytes.
  bytes samples = 1;

  // Sample rate in Hz. Must be 16000. Send on the first chunk; the server
  // requires it to match across all chunks in a stream.
  int32 sample_rate = 2;

  // Hint that no more audio is coming. The server SHOULD flush any pending
  // segments and emit a final SpeechActivity{speech_active=false} event before
  // closing its half of the stream. Client should still half-close its send
  // direction (CloseSend) after sending this chunk.
  bool end_of_stream = 3;
}

// SegmentationEvent is one streamed event emitted by DetectStream.
message SegmentationEvent {
  // Timestamp in seconds from the start of the stream that this event refers
  // to (e.g., the transition time for an activity event, or the end time of a
  // completed segment).
  double timestamp = 1;

  oneof event {
    // Speech activity transition — someone started or stopped speaking.
    // Emitted hot, as soon as the rolling analysis detects a state change.
    SpeechActivity activity = 2;

    // A completed speech region. Emitted after the region has ended and the
    // backend has finalized it; useful for downstream diarization or logging.
    Segment segment = 3;
  }
}

// SpeechActivity is a transition event in DetectStream.
message SpeechActivity {
  // True if speech started at `timestamp`; false if it stopped.
  bool speech_active = 1;
}

// VADModel selects which backend implementation the server loads at startup.
// Wire values are stable; new entries must append at the next free number.
enum VADModel {
  VAD_MODEL_UNSPECIFIED = 0;
  // Pyannote Segmentation 3.0 — full diarization, 3 speakers max.
  VAD_MODEL_PYANNOTE = 1;
  // FunASR FSMN-VAD — tiny, VAD-only, Chinese-trained (works on EN, validate).
  VAD_MODEL_FSMN = 2;
  // FireRedTeam DFSMN-VAD — small, VAD-only, English-friendly.
  VAD_MODEL_FIRERED = 3;
  // NVIDIA Frame_VAD_Multilingual_MarbleNet_v2.0 — multilingual.
  VAD_MODEL_MARBLENET = 4;
  // Silero VAD — well-known tiny model.
  VAD_MODEL_SILERO = 5;
}

// VADConfig is the server startup configuration. Provided via the -config
// flag pointing at a textproto file; unset fields fall back to per-model
// defaults documented in cmd/vad/main.go.
message VADConfig {
  // Which backend to load.
  VADModel model = 1;

  // Path to the weights directory (or single ONNX file for pyannote). If
  // empty, a per-model default is used (e.g. weights/fsmn-vad/ for FSMN).
  string weights_dir = 2;

  // gRPC port. Defaults to 50051 if 0.
  int32 port = 3;

  // ONNX Runtime shared library path. Most users can leave this unset — the
  // server auto-discovers libonnxruntime.{dylib,so} from third_party/ next to
  // the binary and from /usr/local/lib, /opt/homebrew/lib, etc. Set explicitly
  // only to pin a specific version or location. Falls back to ONNXRUNTIME_LIB
  // env var if neither is set.
  string onnxruntime_lib = 4;

  // URL returned by the Fetch RPC instead of the raw weight bytes. Useful for
  // browser clients (e.g. transformers.js) that prefer to download the .onnx
  // directly from a CDN rather than round-trip through this server. Applies
  // to every backend, not just pyannote.
  string weights_url = 5;
}

// FetchRequest requests the ONNX model weights.
message FetchRequest {}

// FetchResponse returns model weights either directly or as a URL.
message FetchResponse {
  oneof result {
    // The raw ONNX model bytes.
    bytes weights = 1;

    // A URL where the model can be downloaded.
    string url = 2;
  }
}
